name: Generar EPG Bravo

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

# PERMISOS: Necesario para que el robot pueda escribir en tu repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: pip install requests

    - name: Ejecutar script
      run: python main.py

    # NUEVO PASO: Guardar el archivo en el repositorio
    - name: Guardar cambios en GitHub
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add guia.xml.gz
        git commit -m "Actualización automática de EPG" || echo "Sin cambios para guardar"
        git push
