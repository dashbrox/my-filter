name: Generar guía EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: generar-guia-epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      PYTHONUNBUFFERED: "1"
      TMDB_API_KEY: ${{ secrets.TMDBAPIKEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache de API
        uses: actions/cache@v4
        with:
          path: api_cache.json
          key: ${{ runner.os }}-epg-cache-v1
          restore-keys: |
            ${{ runner.os }}-epg-cache-

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Verificar archivos requeridos
        run: |
          test -f main.py || (echo "Falta main.py" && exit 1)
          test -f channels.txt || (echo "Falta channels.txt" && exit 1)

      - name: Verificar API key
        run: |
          if [ -z "$TMDB_API_KEY" ]; then
            echo "TMDB_API_KEY vacía, la guía no se enriquecerá"
          else
            echo "TMDB_API_KEY configurada (longitud ${#TMDB_API_KEY})"
          fi

      - name: Ejecutar script
        run: python main.py

      - name: Verificar salida
        run: |
          test -f guia.xml.gz || (echo "No se generó guia.xml.gz" && exit 1)
          ls -lh guia.xml.gz
          if [ -f api_cache.json ]; then ls -lh api_cache.json; fi

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: guia-epg
          path: |
            guia.xml.gz
            api_cache.json
          if-no-files-found: warn

      - name: Commit de cache y guía
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Añadir los archivos generados
          git add guia.xml.gz api_cache.json || true
          
          # Hacer commit de los cambios (solo si los hay)
          git diff --cached --quiet || git commit -m "Actualizar guía EPG"
          
          # Traer la información del repositorio remoto
          git fetch origin main
          
          # Forzar nuestros archivos locales en caso de conflicto con el remoto
          git checkout --ours guia.xml.gz
          git checkout --ours api_cache.json
          git add guia.xml.gz api_cache.json
          
          # Hacer un commit de fusión (merge commit) para unir el historial
          git merge origin/main --strategy-option ours --no-edit
          
          # Empujar nuestros cambios de forma segura
          git push origin main
