name: AI worker api_cache

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

concurrency:
  group: ai-worker-api-cache
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      ZAI_MODEL: "glm-5"
      AI_WORKER_MAX_ITEMS: "8"
      AI_WORKER_MIN_CONFIDENCE: "0.99"
      AI_WORKER_SLEEP_SECONDS: "1.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verificar archivos requeridos
        run: |
          test -f ai_worker.py || (echo "Falta ai_worker.py" && exit 1)
          if [ ! -f api_cache.json ]; then
            echo "{}" > api_cache.json
          fi

      - name: Ejecutar worker
        run: python ai_worker.py

      - name: Commit solo si cambió api_cache.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api_cache.json || true
          git diff --cached --quiet || git commit -m "AI fill api_cache"
          git push
